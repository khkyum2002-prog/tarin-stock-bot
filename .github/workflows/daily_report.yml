name: 매일 오전 7시 시장 리포트

on:
  schedule:
    - cron: '0 22 * * *'   # KST 07:00 = UTC 22:00 (전날)
  workflow_dispatch:

jobs:
  send-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install -r bot/requirements.txt

      - name: 시장 리포트 실행 (1차)
        id: run1
        run: python bot/market_report.py
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        continue-on-error: true

      - name: 10분 대기 후 재시도
        if: steps.run1.outcome == 'failure'
        run: |
          echo "1차 실패 — 10분 후 재시도"
          sleep 600
          python bot/market_report.py
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

  # 1차+재시도 모두 실패하면 텔레그램으로 긴급 알림
  notify-failure:
    needs: send-report
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: 실패 알림 발송
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "parse_mode=HTML" \
            -d "text=🚨 <b>시장 리포트 발송 실패</b>%0A오늘 리포트를 보내지 못했습니다.%0AGitHub Actions 로그를 확인해주세요."
